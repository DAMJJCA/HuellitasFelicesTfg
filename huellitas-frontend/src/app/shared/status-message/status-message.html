<div *ngIf="message"
     class="mb-4 rounded-lg border px-4 py-3 text-sm"
     [ngClass]="{
       'border-rose-200 bg-rose-50 text-rose-800 dark:border-rose-800 dark:bg-rose-900/30 dark:text-rose-100': type === 'error',
       'border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-100': type === 'success',
       'border-sky-200 bg-sky-50 text-sky-800 dark:border-sky-800 dark:bg-sky-900/30 dark:text-sky-100': type === 'info'
     }">
  {{ message }}
</div>
