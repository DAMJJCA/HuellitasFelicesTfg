<div class="min-h-screen bg-cover bg-center" style="background-image: url('/assets/imgInicio/fondo.png')">

  <div class="min-h-screen bg-white/70 backdrop-blur-[2px] text-slate-800">

    <div class="max-w-7xl mx-auto px-6 py-8">

      <header class="flex items-center justify-between mb-10">

        <!-- LOGO -->
        <a routerLink="/" class="inline-flex items-center gap-3">
          <img src="/assets/imgInicio/logo.png" class="w-16 h-auto">
          <div>
            <p class="text-2xl font-bold">Huellitas Felices</p>
            <p class="text-sm text-slate-500">Clínica Veterinaria</p>
          </div>
        </a>

        <!-- BOTONES DERECHA -->
        <div class="flex items-center gap-3">

          <!-- BOTÓN INICIO -->
          <a routerLink="/" class="rounded-xl border border-slate-300 px-4 py-2 text-sm hover:bg-slate-50 transition">
            Inicio
          </a>

          <!-- REGISTRO -->
          <a routerLink="/registro"
            class="rounded-xl bg-emerald-600 px-4 py-2 text-white hover:bg-emerald-700 transition">
            Crear cuenta
          </a>

        </div>

      </header>

      <!-- FORMULARIO -->
      <div class="max-w-md mx-auto">
        <section class="bg-white/90 rounded-3xl shadow-sm border border-slate-200 p-8">

          <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">Iniciar sesión</h1>
            <p class="mt-3 text-slate-600">
              Accede a tu cuenta para gestionar la clínica.
            </p>
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

            <!-- EMAIL -->
            <div>
              <label class="block text-sm font-medium mb-2">Correo</label>
              <input type="email" formControlName="email" class="w-full rounded-xl border px-4 py-3"
                placeholder="correo@ejemplo.com">
            </div>

            <!-- PASSWORD -->
            <div>
              <label class="block text-sm font-medium mb-2">Contraseña</label>
              <input type="password" formControlName="password" class="w-full rounded-xl border px-4 py-3"
                placeholder="Tu contraseña">
            </div>

            <!-- ERROR -->
            <p *ngIf="errorMessage" class="text-sm text-red-600 bg-red-50 p-3 rounded-xl">
              {{ errorMessage }}
            </p>

            <!-- BOTÓN -->
            <button type="submit" [disabled]="isSubmitting"
              class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition">

              {{ isSubmitting ? 'Entrando...' : 'Entrar' }}

            </button>

          </form>

          <!-- LINK REGISTRO -->
          <div class="mt-6 text-center text-sm">
            ¿No tienes cuenta?
            <a routerLink="/registro" class="text-emerald-600 font-medium">
              Crear cuenta
            </a>
          </div>

        </section>
      </div>

    </div>
  </div>
</div>
