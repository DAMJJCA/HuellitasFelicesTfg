<section class="min-h-screen bg-[radial-gradient(circle_at_top,_#d1fae5,_#ecfeff_45%,_#f8fafc_85%)] px-6 py-10">
  <div class="mx-auto flex min-h-[85vh] max-w-6xl items-center justify-center">
    <div class="grid w-full overflow-hidden rounded-3xl border border-teal-100 bg-white shadow-2xl shadow-teal-900/10 lg:grid-cols-[1.1fr_0.9fr]">
      <div class="hidden bg-teal-900 px-10 py-12 text-white lg:block">
        <p class="text-sm uppercase tracking-[0.35em] text-teal-200">Huellitas Felices</p>
        <h1 class="mt-6 max-w-md text-5xl font-black leading-tight">
          Panel para la gestion de la clinica.
        </h1>
        <p class="mt-6 max-w-lg text-base text-teal-100">
          Inicia sesion con tu cuenta para acceder a tu area.
        </p>
      </div>

      <div class="px-6 py-10 sm:px-10 lg:px-12">
        <div class="mx-auto max-w-md">
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-teal-600">Acceso</p>
          <h2 class="mt-4 text-3xl font-black text-slate-900">Iniciar sesion</h2>

          <form [formGroup]="form" (ngSubmit)="submit()" class="mt-8 space-y-5">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">Correo</span>
              <input
                type="email"
                formControlName="email"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-teal-500 focus:bg-white"
                placeholder="admin@huellitas.felices.com" />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">Contrasena</span>
              <input
                type="password"
                formControlName="password"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-teal-500 focus:bg-white"
                placeholder="Tu contrasena" />
            </label>

            <p *ngIf="errorMessage" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
              {{ errorMessage }}
            </p>

            <button
              type="submit"
              [disabled]="isSubmitting"
              class="w-full rounded-2xl bg-teal-700 px-4 py-3 text-sm font-semibold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:bg-teal-400">
              {{ isSubmitting ? 'Entrando...' : 'Entrar al panel' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
