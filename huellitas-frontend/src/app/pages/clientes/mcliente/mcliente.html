<section
  class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 px-6 py-6 md:px-10 md:py-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-semibold tracking-tight">Editar cliente</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400">Actualiza los datos y guarda los cambios.</p>

    <ng-container *ngIf="cliente$ | async as cliente; else cargando">

      <div *ngIf="errorMsg" class="mt-4 rounded-md border border-rose-300 bg-rose-50 text-rose-800 px-4 py-2 text-sm">
        {{ errorMsg }}
      </div>
      <div *ngIf="successMsg"
        class="mt-4 rounded-md border border-emerald-300 bg-emerald-50 text-emerald-800 px-4 py-2 text-sm">
        {{ successMsg }}
      </div>


      <form [formGroup]="form" (ngSubmit)="guardar()"
        class="mt-6 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-6 shadow"
        novalidate>

        <p class="text-2xl font-semibold text-slate-500 dark:text-slate-400 mb-4">ID: {{ cliente?.idCliente }}</p>

        <div class="mb-4">
          <label class="block text-sm mb-1">Nombre <span class="text-rose-600">*</span></label>
          <input type="text" formControlName="nombre"
            class="w-full rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <p *ngIf="form.controls.nombre.touched && form.controls.nombre.invalid" class="mt-1 text-xs text-rose-600">
            Nombre requerido (mín. 2).</p>
        </div>

        <div class="mb-4">
          <label class="block text-sm mb-1">Apellidos <span class="text-rose-600">*</span></label>
          <input type="text" formControlName="apellidos"
            class="w-full rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <p *ngIf="form.controls.apellidos.touched && form.controls.apellidos.invalid"
            class="mt-1 text-xs text-rose-600">Apellidos requeridos.</p>
        </div>

        <div class="mb-4">
          <label class="block text-sm mb-1">Teléfono <span class="text-rose-600">*</span></label>
          <input type="text" formControlName="telefono"
            class="w-full rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="Ej: +34 600 123 123">
          <p *ngIf="form.controls.telefono.touched && form.controls.telefono.invalid"
            class="mt-1 text-xs text-rose-600">Teléfono inválido (6–20 caracteres).</p>
        </div>

        <div class="mb-4">
          <label class="block text-sm mb-1">Email <span class="text-rose-600">*</span></label>
          <input type="email" formControlName="email"
            class="w-full rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="persona@dominio.com">
          <p *ngIf="form.controls.email.touched && form.controls.email.invalid" class="mt-1 text-xs text-rose-600">Email
            inválido.</p>
        </div>

        <div class="mb-4">
          <label class="block text-sm mb-1">Dirección <span class="text-rose-600">*</span></label>
          <input type="text" formControlName="direccion"
            class="w-full rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <p *ngIf="form.controls.direccion.touched && form.controls.direccion.invalid"
            class="mt-1 text-xs text-rose-600">Dirección requerida.</p>
        </div>

        <div class="mt-6 flex justify-end gap-2">
          <button type="button"
            class="rounded-md border border-slate-300 dark:border-slate-700 px-4 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-700"
            (click)="cancelar()">Cancelar</button>

          <button type="submit" [disabled]="saving || form.invalid"
            class="inline-flex items-center gap-2 rounded-md bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 text-sm">
            <svg *ngIf="saving" class="h-4 w-4 animate-spin" viewBox="0 0 24 24" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
            Guardar cambios
          </button>
        </div>
      </form>
    </ng-container>

    <ng-template #cargando>
      <div class="mt-6 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-6 shadow">
        <div class="space-y-2">
          <div class="h-4 w-8/12 bg-slate-200 dark:bg-slate-700 rounded animate-pulse"></div>
          <div class="h-4 w-10/12 bg-slate-200 dark:bg-slate-700 rounded animate-pulse"></div>
          <div class="h-4 w-6/12 bg-slate-200 dark:bg-slate-700 rounded animate-pulse"></div>
        </div>
      </div>
    </ng-template>
  </div>
</section>
