<section class="min-h-screen bg-slate-50 dark:bg-slate-900 px-6 py-6">

  <div class="relative mb-10 rounded-3xl bg-sky-200 dark:bg-sky-900/40
           px-8 py-10 flex flex-col md:flex-row items-center gap-6">

    <div class="flex-1">
      <h1 class="text-4xl font-bold mb-2">
        ¡Bienvenido!
      </h1>
      <p class="text-slate-600 dark:text-slate-300 mb-4">
        Resumen general de la clínica veterinaria
      </p>

      <p class="text-sm text-slate-700 dark:text-slate-200">
        {{ consultasHoy }} consultas ·
        {{ citasHoy }} citas ·
        {{ citasCanceladas }} canceladas
      </p>
    </div>

    <div class="shrink-0 rounded-3xl overflow-hidden shadow-lg">
      <img src="assets/imgDashboard/dashboard.png" alt="Huellitas Felices" class="h-40 md:h-70 w-auto select-none" />
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">


    <div class="rounded-2xl bg-yellow-100 p-5 shadow">
      <p class="text-sm text-slate-500">Consultas hoy</p>
      <h2 class="text-3xl font-bold text-slate-800">
        {{ consultasHoy }}
      </h2>
    </div>


    <div class="rounded-2xl bg-sky-100 p-5 shadow">
      <p class="text-sm text-slate-500">Citas hoy</p>
      <h2 class="text-3xl font-bold text-slate-800">
        {{ citasHoy }}
      </h2>
    </div>

    <div class="rounded-2xl bg-indigo-100 p-5 shadow">
      <p class="text-sm text-slate-500">Mascotas registradas</p>
      <h2 class="text-3xl font-bold text-slate-800">
        {{ totalMascotas }}
      </h2>
    </div>

    <div class="rounded-2xl bg-emerald-100 p-5 shadow">
      <p class="text-sm text-slate-500">Citas canceladas</p>
      <h2 class="text-3xl font-bold text-rose-600">
        {{ citasCanceladas }}
      </h2>
    </div>
  </div>
</section>
