<section
  class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100
         px-6 py-6 md:px-10 md:py-8">

  <header class="mb-8">
    <h1 class="text-4xl font-semibold tracking-tight">Modificar Consulta</h1>
    <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
      Registro clínico del veterinario. Los datos de agenda no pueden modificarse.
    </p>
  </header>

  <div
    class="max-w-4xl rounded-2xl border border-slate-200 dark:border-slate-700
           bg-white dark:bg-slate-800 shadow-lg p-6 md:p-8 space-y-8">

    <!-- Mensajes -->
    <div *ngIf="errorMsg"
         class="rounded-lg border border-rose-300 bg-rose-50 text-rose-800 px-4 py-2 text-sm">
      <strong>Error:</strong> {{ errorMsg }}
    </div>

    <div *ngIf="successMsg"
         class="rounded-lg border border-emerald-300 bg-emerald-50 text-emerald-800 px-4 py-2 text-sm">
      <strong>Éxito:</strong> {{ successMsg }}
    </div>

    <!-- Datos -->
    <section class="rounded-xl border border-slate-200 dark:border-slate-700
                    bg-slate-50 dark:bg-slate-900 p-4 md:p-5">

      <h2 class="text-xs font-semibold uppercase tracking-wide mb-4 text-slate-600 dark:text-slate-400">
        Datos de la consulta
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-5 gap-4">
        <input [value]="idConsulta" readonly class="input-readonly" />
        <input [value]="idCita" readonly class="input-readonly" />
        <input [value]="nombreMascota" readonly class="input-readonly" />
        <input [value]="fecha" readonly class="input-readonly" />
        <input [value]="hora" readonly class="input-readonly" />
      </div>
    </section>

    <!-- FORMULARIO -->
    <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-8">

      <textarea rows="8" formControlName="diagnostico"
                class="input-textarea w-full"
                placeholder="Diagnóstico...">
      </textarea>

      <textarea rows="5" formControlName="observaciones"
                class="input-textarea w-full"
                placeholder="Observaciones...">
      </textarea>

      <section class="flex gap-3 items-start">
        <input type="checkbox"
               formControlName="tratamiento"
               class="mt-1 h-4 w-4 rounded text-indigo-600" />
        <label class="font-semibold text-sm">Requiere tratamiento</label>
      </section>

      <!-- Formulario Tratamiento -->
      <section *ngIf="form.value.tratamiento"
               [formGroup]="tratamientoForm"
               class="rounded-xl border border-indigo-200
                      bg-indigo-50 dark:bg-slate-800 p-5 space-y-4">

        <input formControlName="nombre" class="input-textarea" placeholder="Nombre" />
        <input formControlName="medicamento" class="input-textarea" placeholder="Medicamento" />
        <input formControlName="dosis" class="input-textarea" placeholder="Dosis" />
        <input formControlName="duracion" class="input-textarea" placeholder="Duración" />
        <textarea formControlName="descripcion" rows="4"
                  class="input-textarea w-full"
                  placeholder="Descripción">
        </textarea>
      </section>

      <div class="flex justify-end gap-3">
        <button type="button" (click)="cancelar()" class="btn-secondary">
          Cancelar
        </button>
        <button type="submit" [disabled]="cargando" class="btn-primary">
          Guardar
        </button>
      </div>
    </form>
  </div>
</section>
