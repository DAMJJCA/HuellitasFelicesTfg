<section class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 px-6 py-6 md:px-10 md:py-8">
  <div class="max-w-2xl mx-auto">

    <h1 class="text-2xl font-semibold tracking-tight">Editar mascota</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Actualiza los datos y guarda los cambios.</p>

    <div *ngIf="errorMsg" class="mb-4 rounded-md border border-rose-300 bg-rose-50 text-rose-800 px-4 py-2 text-sm">
      {{ errorMsg }}
    </div>

    <div *ngIf="successMsg" class="mb-4 rounded-md border border-emerald-300 bg-emerald-50 text-emerald-800 px-4 py-2 text-sm">
      {{ successMsg }}
    </div>

    <form [formGroup]="form" (ngSubmit)="guardar()" class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-6 shadow">

      <div class="mb-4 text-sm text-slate-400">
        <strong>ID:</strong> <span>{{ (mascota$ | async)?.idMascota }}</span>
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Nombre *</label>
        <input formControlName="nombre" class="w-full rounded-md border px-3 py-2 text-sm">
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Numero de chip</label>
        <input formControlName="numeroChip" maxlength="50"
               class="w-full rounded-md border px-3 py-2 text-sm"
               placeholder="Ej. 941000024681357">
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Foto de la mascota</label>
        <input formControlName="fotoUrl"
               class="w-full rounded-md border px-3 py-2 text-sm"
               placeholder="URL o imagen en base64">
      </div>

      <div *ngIf="!esCliente" class="mb-4">
        <label class="block text-sm mb-1">Dueño *</label>
        <select formControlName="idCliente" class="w-full rounded-md border px-3 py-2 text-sm">
          <option value="">Seleccione...</option>
          <option *ngFor="let c of clientes" [value]="c.idCliente">
            {{ c.nombre }} {{ c.apellidos }}
          </option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Fecha nacimiento</label>
        <input type="date" formControlName="fechaNacimiento" class="w-full rounded-md border px-3 py-2 text-sm">
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Sexo</label>
        <select formControlName="sexo" class="w-full rounded-md border px-3 py-2 text-sm">
          <option value="">Seleccione...</option>
          <option value="Macho">Macho</option>
          <option value="Hembra">Hembra</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Especie *</label>
        <input formControlName="especie" class="w-full rounded-md border px-3 py-2 text-sm">
      </div>

      <div class="mb-4">
        <label class="block text-sm mb-1">Raza</label>
        <input formControlName="raza" class="w-full rounded-md border px-3 py-2 text-sm">
      </div>

      <div class="mb-6">
        <label class="block text-sm mb-1">Peso (kg)</label>
        <input type="number" step="0.01" formControlName="peso" class="w-full rounded-md border px-3 py-2 text-sm">
      </div>

      <div class="mb-4 rounded-lg border border-amber-200 bg-amber-50 p-4 dark:border-amber-800 dark:bg-amber-900/20">
        <h2 class="mb-3 text-sm font-semibold">Alertas clínicas</h2>
        <div class="grid gap-3">
          <textarea formControlName="alergias" rows="2" class="w-full rounded-md border px-3 py-2 text-sm" placeholder="Alergias relevantes"></textarea>
          <textarea formControlName="enfermedadesCronicas" rows="2" class="w-full rounded-md border px-3 py-2 text-sm" placeholder="Enfermedades crónicas"></textarea>
          <textarea formControlName="medicacionHabitual" rows="2" class="w-full rounded-md border px-3 py-2 text-sm" placeholder="Medicación habitual"></textarea>
          <textarea formControlName="observacionesInternas" rows="2" class="w-full rounded-md border px-3 py-2 text-sm" placeholder="Observaciones internas"></textarea>
        </div>
      </div>

      <div class="flex justify-end gap-2">
        <button type="button" (click)="cancelar()" class="rounded-md border px-4 py-2">Cancelar</button>
        <button type="submit" class="rounded-md bg-emerald-600 text-white px-4 py-2">Guardar</button>
      </div>
    </form>
  </div>
</section>
