<section class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100
                px-6 py-6 md:px-10 md:py-8">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-semibold tracking-tight">Crear nueva cita</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400">
      Selecciona la fecha, hora y asigna mascota y veterinario.
    </p>
    @if (error()){
      <div class="mt-4 rounded-md border border-rose-300 bg-rose-50 text-rose-800 px-4 py-2 text-sm">
        {{ error() }}
      </div>
    }
    @if (success()){
       <div class="mt-4 rounded-md border border-emerald-300 bg-emerald-50 text-emerald-800 px-4 py-2 text-sm">
        {{ success() }}
      </div>
    }
    <form #f="ngForm" (ngSubmit)="onSubmit(f)" class="mt-6 rounded-xl border border-slate-200 dark:border-slate-700
                 bg-white dark:bg-slate-800 p-6 shadow space-y-6">

      <div>
        <label class="block text-sm mb-1">Mascota <span class="text-rose-600">*</span></label>
        <select name="idMascota" required [(ngModel)]="cita.idMascota" class="w-full rounded-lg border border-slate-300 dark:border-slate-700
                       bg-white dark:bg-slate-900 px-4 py-3 text-base focus:ring-indigo-500">
          <option value="" disabled selected>Seleccione una mascota...</option>
          <option *ngFor="let m of mascotas()" [value]="m.idMascota">
            {{ m.nombre }} - {{ m.cliente.nombre }} {{ m.cliente.apellidos }} - {{ m.especie }} - #{{ m.idMascota }}
          </option>
        </select>
      </div>


      <div>
        <label class="block text-sm mb-1">Veterinario <span class="text-rose-600">*</span></label>

        <select name="idVeterinario" required [(ngModel)]="cita.idVeterinario" class="w-full rounded-lg border border-slate-300 dark:border-slate-700
                       bg-white dark:bg-slate-900 px-4 py-3 text-base focus:ring-indigo-500">
          <option value="" disabled selected>Seleccione un veterinario...</option>
          <option *ngFor="let v of veterinarios()" [value]="v.idVeterinario">
            {{ v.nombre }} - {{ v.especialidad }} - #{{ v.idVeterinario }}
          </option>
        </select>
      </div>

      <div class="flex gap-4">
        <div class="grow">
          <label class="block text-sm mb-1">Fecha de la cita <span class="text-rose-600">*</span></label>

          <input type="date" name="fecha" required [min]="minFecha" [(ngModel)]="cita.fecha" class="w-full rounded-lg border border-slate-300 dark:border-slate-700
                      bg-white dark:bg-slate-900 px-4 py-3 text-base focus:ring-indigo-500
                      focus:outline-none shadow-sm">
        </div>

        <div class="grow">
          <label class="block text-sm mb-1">Hora de la cita <span class="text-rose-600">*</span></label>

          <input type="time" name="hora" required [(ngModel)]="cita.hora" class="w-full rounded-lg border border-slate-300 dark:border-slate-700
                      bg-white dark:bg-slate-900 px-4 py-3 text-base focus:ring-indigo-500
                      focus:outline-none shadow-sm">
        </div>
      </div>

      <div>
        <label class="block text-sm mb-1">Motivo <span class="text-rose-600">*</span></label>
        <input type="text" name="motivo" required minlength="3" [(ngModel)]="cita.motivo" class="w-full rounded-lg border border-slate-300 dark:border-slate-700
                      bg-white dark:bg-slate-900 px-4 py-3 text-base focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-sm mb-1">Estado inicial</label>
        <select name="estado" required [(ngModel)]="cita.estado" class="w-full rounded-lg border border-slate-300 dark:border-slate-700
                       bg-white dark:bg-slate-900 px-4 py-3 text-base focus:ring-indigo-500">
          <option *ngFor="let estado of estados" [value]="estado.value">
            {{ estado.label }}
          </option>
        </select>
      </div>

      <div class="flex justify-end gap-2 pt-4">
        <button type="button" class="rounded-lg border border-slate-300 dark:border-slate-700
                       px-5 py-2.5 text-sm hover:bg-slate-50 dark:hover:bg-slate-700" (click)="cancelar()">
          Cancelar
        </button>
        <button type="submit" class="rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white
                       px-5 py-2.5 text-sm font-medium shadow disabled:opacity-60
                       disabled:cursor-not-allowed">
          Guardar cita
        </button>
      </div>
    </form>
  </div>
</section>
