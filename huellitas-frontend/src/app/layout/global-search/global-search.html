<div class="relative w-full max-w-3xl">
  <div class="relative">
    <svg class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
         fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/>
    </svg>

    <input #buscador
           type="search"
           [value]="termino()"
           placeholder="Buscar mascota, cliente, cita, documento..."
           class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-10 pr-3 text-sm shadow-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-500/30 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100"
           (focus)="abierto.set(true)"
           (input)="buscar(buscador.value)">
  </div>

  <div *ngIf="abierto() && termino().trim().length >= 2"
       class="absolute left-0 right-0 top-full z-40 mt-2 max-h-[70vh] overflow-auto rounded-lg border border-slate-200 bg-white p-2 shadow-xl dark:border-slate-700 dark:bg-slate-800">

    <div *ngIf="cargando()" class="px-3 py-4 text-sm text-slate-500 dark:text-slate-400">
      Buscando...
    </div>

    <div *ngIf="!cargando() && errorMsg()" class="px-3 py-4 text-sm text-rose-700 dark:text-rose-200">
      {{ errorMsg() }}
    </div>

    <div *ngIf="!cargando() && !errorMsg() && resultados().length === 0"
         class="px-3 py-4 text-sm text-slate-500 dark:text-slate-400">
      No hay resultados para "{{ termino() }}".
    </div>

    <ng-container *ngIf="!cargando() && resultados().length > 0">
      <section *ngFor="let grupo of grupos()" class="py-1">
        <h3 class="px-3 pb-1 pt-2 text-xs font-semibold uppercase text-slate-500 dark:text-slate-400">
          {{ etiquetaGrupo(grupo.tipo) }}
        </h3>

        <button *ngFor="let resultado of grupo.items"
                type="button"
                class="block w-full rounded-md px-3 py-2 text-left transition hover:bg-slate-100 dark:hover:bg-slate-700"
                (click)="navegar(resultado)">
          <span class="block text-sm font-medium text-slate-800 dark:text-slate-100">
            {{ resultado.titulo }}
          </span>
          <span class="mt-0.5 block text-xs text-slate-500 dark:text-slate-400">
            {{ resultado.detalle }}
          </span>
        </button>
      </section>
    </ng-container>
  </div>
</div>
