<aside class="flex h-screen flex-col overflow-hidden border-r border-blue-100 bg-slate-50 p-3 text-slate-800 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100">
  <div class="shrink-0 border-b border-blue-100 pb-4 text-center dark:border-slate-800">
    <img
      [src]="imagenPerfil"
      class="mx-auto h-24 w-24 rounded-full border-4 border-white object-cover shadow-md ring-2 ring-blue-200 dark:border-slate-900 dark:ring-blue-900 md:h-28 md:w-28" />

    <h1 class="mt-2 text-sm font-semibold leading-tight md:text-base">
      {{ nombreUsuario }}
    </h1>

    <div class="mt-1 flex items-center justify-center gap-2">
      <p class="text-xs text-slate-500 dark:text-slate-400">
        {{ rolUsuario }}
      </p>
      <a
        routerLink="/perfil"
        title="Perfil"
        aria-label="Perfil"
        class="inline-grid h-8 w-8 place-items-center rounded-full border border-blue-100 bg-white text-slate-500 shadow-sm transition hover:border-blue-300 hover:bg-blue-50 hover:text-blue-700 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:border-blue-800 dark:hover:bg-blue-950 dark:hover:text-blue-100">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.827 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.827 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.827-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.827-3.31 2.37-2.37.996.607 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </a>
    </div>
  </div>

  <nav class="mt-3 min-h-0 flex-1 space-y-1 overflow-y-auto pr-1">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="bg-blue-100 text-blue-800 dark:bg-blue-950 dark:text-blue-100"
      class="block rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-white hover:text-blue-800 hover:shadow-sm dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white">
      {{ item.label }}
    </a>
  </nav>

  <div class="shrink-0 border-t border-blue-100 pt-3 dark:border-slate-800">
    <button
      (click)="logout()"
      class="w-full rounded-lg bg-slate-100 px-3 py-2 text-left text-sm text-slate-700 transition hover:bg-rose-50 hover:text-rose-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-rose-950/60 dark:hover:text-rose-100">
      Cerrar sesion
    </button>
  </div>
</aside>
