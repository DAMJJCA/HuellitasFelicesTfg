<aside class="flex h-screen flex-col overflow-hidden border-r border-slate-200 bg-white p-3 text-slate-800 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100">
  <div class="shrink-0 border-b border-slate-200 pb-3 text-center dark:border-slate-800">
    <img
      [src]="imagenPerfil"
      class="mx-auto h-20 w-20 rounded-full border-2 border-blue-200 object-cover dark:border-blue-900 md:h-24 md:w-24" />

    <h1 class="mt-2 text-sm font-semibold leading-tight md:text-base">
      {{ nombreUsuario }}
    </h1>

    <p class="text-xs text-slate-500 dark:text-slate-400">
      {{ rolUsuario }}
    </p>
  </div>

  <nav class="mt-3 min-h-0 flex-1 space-y-1 overflow-y-auto pr-1">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="bg-blue-100 text-blue-800 dark:bg-blue-950 dark:text-blue-100"
      class="block rounded-lg px-3 py-2 text-sm text-slate-600 transition hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white">
      {{ item.label }}
    </a>
  </nav>

  <div class="shrink-0 border-t border-slate-200 pt-3 dark:border-slate-800">
    <button
      (click)="logout()"
      class="w-full rounded-lg bg-slate-100 px-3 py-2 text-left text-sm text-slate-700 transition hover:bg-rose-50 hover:text-rose-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-rose-950/60 dark:hover:text-rose-100">
      Cerrar sesion
    </button>
  </div>
</aside>
