spring.application.name=HuellitasFelices

# SUPABASE (CONNECTION POOLER)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres}
spring.datasource.username=${DB_USERNAME:postgres.cvkniojcstauhcqnkdlf}
spring.datasource.password=${DB_PASSWORD:Cristancho123}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI (CRITICO PARA SUPABASE)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=0

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# DEVTOOLS (DESACTIVAR)
spring.devtools.restart.enabled=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JWT
jwt.secret=${JWT_SECRET:VXdhV3Rhc0ZlbGljZXNBZG1pbkFjY2Vzb1RvdGFsU2VjcmV0S2V5MjAyNg==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# RECORDATORIOS DE CITAS
app.reminders.email.enabled=${REMINDERS_EMAIL_ENABLED:false}
app.reminders.email.from=${REMINDERS_EMAIL_FROM:no-reply@huellitasfelices.local}
app.reminders.appointments.cron=${REMINDERS_APPOINTMENTS_CRON:0 0 9 * * *}
app.reminders.preventives.cron=${REMINDERS_PREVENTIVES_CRON:0 30 9 * * *}
app.reminders.preventives.days-ahead=${REMINDERS_PREVENTIVES_DAYS_AHEAD:7}
app.reminders.zone=${REMINDERS_ZONE:Europe/Madrid}

# SMTP opcional. Activa REMINDERS_EMAIL_ENABLED=true cuando estos valores sean reales.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# DOCUMENTOS MEDICOS
spring.servlet.multipart.max-file-size=${DOCUMENTS_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${DOCUMENTS_MAX_REQUEST_SIZE:10MB}
app.documents.upload-dir=${DOCUMENTS_UPLOAD_DIR:uploads/documentos-medicos}

# SUPABASE STORAGE opcional
app.storage.supabase.enabled=${SUPABASE_STORAGE_ENABLED:false}
app.storage.supabase.url=${SUPABASE_URL:}
app.storage.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.storage.supabase.profile-bucket=${SUPABASE_PROFILE_BUCKET:profile-images}

# CANALES DE NOTIFICACION opcionales
app.notifications.sms.enabled=${NOTIFICATIONS_SMS_ENABLED:false}
app.notifications.whatsapp.enabled=${NOTIFICATIONS_WHATSAPP_ENABLED:false}
app.notifications.sms.provider-url=${NOTIFICATIONS_SMS_PROVIDER_URL:}
app.notifications.whatsapp.provider-url=${NOTIFICATIONS_WHATSAPP_PROVIDER_URL:}

# LOGS OPERATIVOS
logging.level.com.veterinaria.demo=${APP_LOG_LEVEL:INFO}
logging.file.name=${APP_LOG_FILE:logs/huellitas-felices.log}
